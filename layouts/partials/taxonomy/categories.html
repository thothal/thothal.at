<div class="categories">
   <i class="fa-solid fa-folder" aria-hidden="true"></i>
   {{- range $index, $el := . -}}
   {{- if gt $index 0 }}
   <span class="separator">•</span>
   {{- end }}
   <a href="{{ ( printf " categories/%s/" ( . | urlize ) ) | relLangURL }}">{{ . }}</a>
   {{- end -}}
</div>
